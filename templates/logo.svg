<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <!-- شعار مؤقّت — استبدل هذا الملف بشعار المشروع الفعلي (SVG أو PNG شفّاف) -->
  <!-- الأبعاد المقترحة: عرض ≥ 300px، ارتفاع ≤ 100px، خلفيةٌ شفّافة -->

  <!-- الشريط الجانبي الأخضر -->
  <rect x="0" y="10" width="6" height="120" rx="3" fill="#0b3d2e"/>

  <!-- دائرة الرمز -->
  <circle cx="55" cy="70" r="48" fill="#0b3d2e"/>
  <text x="55" y="80" text-anchor="middle" font-family="serif" font-size="36" font-weight="bold" fill="#ffffff">م</text>

  <!-- النص الرئيسي -->
  <text x="300" y="58" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#0b3d2e" direction="rtl">المستشار القانوني الذكي</text>

  <!-- النص الفرعي -->
  <text x="300" y="95" text-anchor="middle" font-family="serif" font-size="15" fill="#4a7c5e" direction="rtl">مساعد قانوني يمني ذكي · On-Prem · Gemma AI</text>

  <!-- خطٌّ فاصل تحت النص الفرعي -->
  <line x1="110" y1="112" x2="490" y2="112" stroke="#0b3d2e" stroke-width="1.5"/>

  <!-- ملاحظة (للمطوّر — لا تظهر في PDF) -->
