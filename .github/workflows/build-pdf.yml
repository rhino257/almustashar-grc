name: بناء وثائق PDF الرسمية

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      file:
        description: "مسار ملف واحد لتحويله (اتركيه فارغاً لتحويل كل الملفات)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: سحب المستودع
        uses: actions/checkout@v4

      - name: تثبيت Pandoc و WeasyPrint والخطوط العربية
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc weasyprint fonts-hosny-amiri

      - name: توليد ملفات PDF
        run: |
          set -e
          mkdir -p pdf-output
          TARGET_FILE="$(jq -r '.inputs.file // ""' "$GITHUB_EVENT_PATH")"
          CSS="$(pwd)/templates/pdf-arabic.css"

          convert_one() {
            file="$1"
            base="$(printf '%s' "${file#./}" | sed -e 's/\.md$//' -e 's#[/ ]#_#g')"
            out="pdf-output/${base}.pdf"
            echo ":: تحويل $file -> $out"
            pandoc "$file" \
              --standalone \
              --from=gfm+yaml_metadata_block \
              --to=pdf \
              --pdf-engine=weasyprint \
              --css="$CSS" \
              --metadata lang=ar \
              --metadata dir=rtl \
              --toc --toc-depth=2 \
              -o "$out" || echo "!! تعذّر تحويل $file (سيُتجاوز)"
          }

          if [ -n "$TARGET_FILE" ]; then
            if [ -f "$TARGET_FILE" ]; then
              convert_one "$TARGET_FILE"
            else
              echo "الملف غير موجود: $TARGET_FILE"; exit 1
            fi
          else
            find . -type f -name '*.md' \
              -not -path './pdf-output/*' \
              -not -path './.github/*' -print0 |
            while IFS= read -r -d '' f; do convert_one "$f"; done
          fi

          echo "== الملفات المولّدة =="
          ls -la pdf-output

      - name: رفع حزمة الـ PDF (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: almustashar-grc-pdf
          path: pdf-output/*.pdf
          if-no-files-found: error

      - name: نشر إصدار رسمي عند وسم Git (Release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pdf-output/*.pdf
          fail_on_unmatched_files: false
